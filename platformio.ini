; PlatformIO Project Configuration File
;
; OXOTP+ - ESP32 TOTP Authenticator for M5StickC / M5StickC Plus
;
; Build instructions:
;   1. Install PlatformIO (VS Code extension or CLI)
;   2. Open this project folder
;   3. Build: pio run
;   4. Upload: pio run --target upload
;
; For OTA updates, the 'min_spiffs' partition scheme is used.

[env:m5stick-c]
platform = espressif32
board = m5stick-c
framework = arduino

; Minimal SPIFFS partition scheme (required for OTA updates)
board_build.partitions = min_spiffs.csv

; Monitor settings
monitor_speed = 115200

; Library dependencies
lib_deps = 
    m5stack/M5Unified@^0.1.17
    arduino-libraries/ArduinoHttpClient@^0.6.1
    bblanchon/ArduinoJson@^7.0.0
    paulstoffregen/Time@^1.6.1
    https://github.com/lucadentella/TOTP-Arduino.git
    https://github.com/rpolitex/ArduinoNvs.git

; Build flags
build_flags = 
    -D ARDUINO_M5STICK_C
    -D BOARD_HAS_PSRAM

[env:m5stick-c-plus]
platform = espressif32
board = m5stick-c
framework = arduino

; Minimal SPIFFS partition scheme (required for OTA updates)
board_build.partitions = min_spiffs.csv

; Monitor settings
monitor_speed = 115200

; Library dependencies
lib_deps = 
    m5stack/M5Unified@^0.1.17
    arduino-libraries/ArduinoHttpClient@^0.6.1
    bblanchon/ArduinoJson@^7.0.0
    paulstoffregen/Time@^1.6.1
    https://github.com/lucadentella/TOTP-Arduino.git
    https://github.com/rpolitex/ArduinoNvs.git

; Build flags
build_flags = 
    -D ARDUINO_M5STICK_C_PLUS
    -D BOARD_HAS_PSRAM

